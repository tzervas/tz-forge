# Project kind: Hugging Face Python ML project
id: ml-python-hf
description: HF transformers train scripts + model card stub + fractal defaults
default_assistant: fractal-swarm
skeleton: modules/skeletons/ml-python-hf

modules:
  always:
    - fleet
    - license-mit
    - pre-commit
    - local-ci-python
    - gitignore-python
    - gitignore-ml
    - dependabot-python
    - gitleaks-config
    - skeleton

assistant_profiles:
  humans-only: []
  solo-ai:
    - agents-md-lite
    - claude-md-lite
  solo-ai-rich:
    - agents-md-lite
    - claude-md-lite
    - skills-generic
    - skills-ml
    - kickoffs
  fractal-swarm:
    - agents-md-fractal
    - claude-md-lite
    - skills-generic
    - skills-ml
    - kickoffs
    - model-policy
