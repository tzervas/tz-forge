# Project kind: hybrid Rust + Python (PyO3-ready)
id: hybrid-rust-python
description: Dual-stack crate (Rust lib + Python face) + both local-ci modules
default_assistant: solo-ai
skeleton: modules/skeletons/hybrid-rust-python

modules:
  always:
    - fleet
    - license-mit
    - pre-commit
    - local-ci-rust
    - local-ci-python
    - rust-cargo-deny
    - rust-toolchain
    - gitignore-rust
    - gitignore-python
    - dependabot-cargo
    - gitleaks-config
    - skeleton

assistant_profiles:
  humans-only: []
  solo-ai:
    - agents-md-lite
    - claude-md-lite
  solo-ai-rich:
    - agents-md-lite
    - claude-md-lite
    - skills-generic
    - kickoffs
  fractal-swarm:
    - agents-md-fractal
    - claude-md-lite
    - skills-generic
    - kickoffs
    - model-policy
