# tz-forge catalog — composable modules, project kinds, assistant profiles
# Design: plans/fractal/P27_DEVTOOLING_TEMPLATES.md
# AI surface: plans/evidence/P27-devtooling/AI_ASSISTANT_COMPOSABLE.md
# Operator: plans/evidence/P27-devtooling/OPERATOR_PROFILE.md

version: 1
name: tz-forge

assistant_profiles:
  humans-only:
    description: Fleet + license + pre-commit only — no CLAUDE/AGENTS/skills
    human: true
    solo_ai: false
    fractal_swarm: false
  solo-ai:
    description: + CLAUDE.md lite + AGENTS.md lite
    human: true
    solo_ai: true
    fractal_swarm: false
  solo-ai-rich:
    description: + skills pack + kickoffs
    human: true
    solo_ai: true
    fractal_swarm: false
  fractal-swarm:
    description: Fractal AGENTS + multi-skills + kickoffs + model policy + harness docs
    human: true
    solo_ai: true
    fractal_swarm: true

modules:
  fleet:
    path: modules/fleet
    description: P26 fleet pack — workflows, issue close, templates, badges, FLEET_STANDARDS
    applies: [all]
    extract_candidate: fleet-pack-p26

  license-mit:
    path: modules/license/mit
    description: MIT LICENSE + REUSE.toml fragment
    applies: [all]
    extract_candidate: contributing-md

  pre-commit:
    path: modules/pre-commit
    description: Default .pre-commit-config.yaml (gitleaks + trailing whitespace)
    applies: [all]
    extract_candidate: pre-commit-default
    install:
      - { src: .pre-commit-config.yaml, dest: .pre-commit-config.yaml }

  local-ci-rust:
    path: modules/local-ci/rust
    description: scripts/check.sh for Rust (fmt, clippy -D warnings, build, test)
    applies: [rust-lib, rust-cli, mcp-rust, ml-rust-crate, hybrid-rust-python]
    extract_candidate: local-check-sh-rust
    install:
      - { src: check.sh, dest: scripts/check.sh, mode: "0755" }

  local-ci-python:
    path: modules/local-ci/python
    description: scripts/check.sh for Python (uv/ruff/pytest)
    applies: [python-lib, python-mcp, ml-python-hf, hybrid-rust-python]
    extract_candidate: local-check-sh-python
    install:
      - { src: check.sh, dest: scripts/check.sh, mode: "0755" }

  rust-cargo-deny:
    path: modules/rust/cargo-deny
    description: Sample deny.toml (MIT/Apache/BSD/ISC/Zlib/Unicode-3.0)
    applies: [rust-lib, rust-cli, mcp-rust, ml-rust-crate, hybrid-rust-python]
    extract_candidate: cargo-deny-toml
    install:
      - { src: deny.toml, dest: deny.toml }

  rust-toolchain:
    path: modules/rust/toolchain
    description: rust-toolchain.toml (stable + rustfmt + clippy)
    applies: [rust-lib, rust-cli, mcp-rust, ml-rust-crate, hybrid-rust-python]
    extract_candidate: rust-toolchain-toml
    install:
      - { src: rust-toolchain.toml, dest: rust-toolchain.toml }

  dependabot-cargo:
    path: modules/gha/dependabot-cargo
    description: Dependabot for cargo + github-actions
    applies: [rust-lib, rust-cli, mcp-rust, ml-rust-crate, hybrid-rust-python]
    extract_candidate: dependabot-cargo-gha

  dependabot-python:
    path: modules/gha/dependabot-python
    description: Dependabot for pip + github-actions
    applies: [python-lib, python-mcp, ml-python-hf]
    extract_candidate: dependabot-python-gha

  gitleaks-config:
    path: modules/gha/gitleaks-config
    description: .gitleaks.toml fragment
    applies: [all]
    extract_candidate: gitleaks-config
    install:
      - { src: .gitleaks.toml, dest: .gitleaks.toml }

  gitignore-rust:
    path: modules/git
    description: Rust .gitignore fragment
    applies: [rust-lib, rust-cli, mcp-rust, ml-rust-crate, hybrid-rust-python]
    extract_candidate: gitignore-language
    install:
      - { src: gitignore-rust, dest: .gitignore, merge: append }

  gitignore-python:
    path: modules/git
    description: Python .gitignore fragment
    applies: [python-lib, python-mcp, ml-python-hf, hybrid-rust-python]
    extract_candidate: gitignore-language
    install:
      - { src: gitignore-python, dest: .gitignore, merge: append }

  gitignore-ml:
    path: modules/git
    description: ML artifacts .gitignore fragment
    applies: [ml-rust-crate, ml-python-hf]
    extract_candidate: gitignore-language
    install:
      - { src: gitignore-ml, dest: .gitignore, merge: append }

  devcontainer-rust:
    path: modules/devcontainer/rust
    description: Devcontainer for Rust
    applies: [rust-lib, rust-cli, mcp-rust, ml-rust-crate]
    extract_candidate: devcontainer-json
    install:
      - { src: devcontainer.json, dest: .devcontainer/devcontainer.json }

  devcontainer-python:
    path: modules/devcontainer/python-uv
    description: Devcontainer for Python + uv
    applies: [python-lib, python-mcp, ml-python-hf]
    extract_candidate: devcontainer-json
    install:
      - { src: devcontainer.json, dest: .devcontainer/devcontainer.json }

  agents-md-lite:
    path: modules/agents/agents-md-lite
    description: Short AGENTS.md — checks, PR tiers, no secrets
    profiles: [solo-ai, solo-ai-rich]
    extract_candidate: agents-md-tero
    install:
      - { src: AGENTS.md.tmpl, dest: AGENTS.md, template: true }

  agents-md-fractal:
    path: modules/agents/agents-md-fractal
    description: Tero-first, subagents, Refs vs Closes, model policy pointer
    profiles: [fractal-swarm]
    extract_candidate: agents-md-tero
    install:
      - { src: AGENTS.md.tmpl, dest: AGENTS.md, template: true }

  claude-md-lite:
    path: modules/agents/claude-md-lite
    description: CLAUDE.md skeleton — build/test commands, project map
    profiles: [solo-ai, solo-ai-rich, fractal-swarm]
    extract_candidate: claude-md-agent-rules
    install:
      - { src: CLAUDE.md.tmpl, dest: CLAUDE.md, template: true }

  skills-generic:
    path: modules/agents/skills-generic
    description: Generic SKILL.md pack (commit-prep, pr-review, fleet-gap, unsafe-review, cargo-check)
    profiles: [solo-ai-rich, fractal-swarm]
    install_dir:
      src: .
      dest: skills

  skills-ml:
    path: modules/agents/skills-ml
    description: ML skills (hf-model-card, train-smoke)
    profiles: [solo-ai-rich, fractal-swarm]
    applies: [ml-rust-crate, ml-python-hf]
    install_dir:
      src: .
      dest: skills

  kickoffs:
    path: modules/agents/kickoffs
    description: .claude/kickoffs README + wave conventions
    profiles: [solo-ai-rich, fractal-swarm]
    install:
      - { src: README.md, dest: .claude/kickoffs/README.md }

  model-policy:
    path: modules/agents
    description: L0 frontier / L1 composer; no Copilot auto-review
    profiles: [fractal-swarm]
    install:
      - { src: model-policy.md, dest: docs/MODEL_POLICY.md }

  harness-min:
    path: modules/agents/harness-min
    description: agent-harness compose-by-ref docs
    profiles: [fractal-swarm]
    install:
      - { src: COMPOSE.md, dest: docs/compose/agent-harness.md }

  cabal-profile:
    path: modules/agents/cabal-profile
    description: cabal-devmelopner compose-by-ref docs
    profiles: [fractal-swarm]
    install:
      - { src: COMPOSE.md, dest: docs/compose/cabal-devmelopner.md }

  security-mcp-opt:
    path: modules/agents/security-mcp-opt
    description: Optional security-mcp compose docs
    profiles: [fractal-swarm]
    install:
      - { src: COMPOSE.md, dest: docs/compose/security-mcp.md }

  skeleton:
    path: modules/skeletons
    description: Kind-specific code skeleton (Cargo.toml / pyproject / src)
    applies: [all]

project_kinds:
  rust-lib:
    description: Library crate + tests + fleet
    path: project-kinds/rust-lib.yaml
    default_assistant: solo-ai
    skeleton: modules/skeletons/rust-lib
  rust-cli:
    description: CLI crate + fleet
    path: project-kinds/rust-cli.yaml
    default_assistant: solo-ai
    skeleton: modules/skeletons/rust-cli
  python-lib:
    description: Python library + fleet
    path: project-kinds/python-lib.yaml
    default_assistant: solo-ai
    skeleton: modules/skeletons/python-lib
  python-mcp:
    description: Python MCP server + fleet
    path: project-kinds/python-mcp.yaml
    default_assistant: solo-ai
    skeleton: modules/skeletons/python-mcp
  agent-swarm:
    description: Multi-agent swarm workspace
    path: project-kinds/agent-swarm.yaml
    default_assistant: fractal-swarm
    skeleton: modules/skeletons/agent-swarm
  ml-rust-crate:
    description: ML Rust train/infer crate
    path: project-kinds/ml-rust-crate.yaml
    default_assistant: fractal-swarm
    skeleton: modules/skeletons/ml-rust-crate
  ml-python-hf:
    description: HF Python train + model card
    path: project-kinds/ml-python-hf.yaml
    default_assistant: fractal-swarm
    skeleton: modules/skeletons/ml-python-hf
  mcp-rust:
    description: Rust MCP server
    path: project-kinds/mcp-rust.yaml
    default_assistant: solo-ai
    skeleton: modules/skeletons/mcp-rust
  hybrid-rust-python:
    description: PyO3 dual-stack
    path: project-kinds/hybrid-rust-python.yaml
    default_assistant: solo-ai
    skeleton: modules/skeletons/hybrid-rust-python
  infra-ops:
    description: Infra/ops scripts + fleet
    path: project-kinds/infra-ops.yaml
    default_assistant: humans-only
    skeleton: modules/skeletons/infra-ops

extract_backlog:
  - codeowners-default
  - release-workflow-manual
  - ci-workflow-manual-local-first
  - copilot-instructions-optin
  - cursor-rules-optin
  - claude-dot-dir-commands
