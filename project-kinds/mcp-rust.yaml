# Project kind: Rust MCP server
id: mcp-rust
description: Rust MCP server (security-mcp class) + fleet + cargo-deny
default_assistant: solo-ai
skeleton: modules/skeletons/mcp-rust

modules:
  always:
    - fleet
    - license-mit
    - pre-commit
    - local-ci-rust
    - rust-cargo-deny
    - rust-toolchain
    - gitignore-rust
    - dependabot-cargo
    - gitleaks-config
    - skeleton

assistant_profiles:
  humans-only: []
  solo-ai:
    - agents-md-lite
    - claude-md-lite
  solo-ai-rich:
    - agents-md-lite
    - claude-md-lite
    - skills-generic
    - kickoffs
  fractal-swarm:
    - agents-md-fractal
    - claude-md-lite
    - skills-generic
    - kickoffs
    - model-policy
    - security-mcp-opt
