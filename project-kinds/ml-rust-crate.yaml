# Project kind: ML training/inference Rust crate
id: ml-rust-crate
description: ML Rust crate (BitNet/trit/VSA/PEFT-style) + fleet + fractal defaults
default_assistant: fractal-swarm
skeleton: modules/skeletons/ml-rust-crate

modules:
  always:
    - fleet
    - license-mit
    - pre-commit
    - local-ci-rust
    - rust-cargo-deny
    - rust-toolchain
    - gitignore-rust
    - gitignore-ml
    - dependabot-cargo
    - gitleaks-config
    - skeleton

assistant_profiles:
  humans-only: []
  solo-ai:
    - agents-md-lite
    - claude-md-lite
  solo-ai-rich:
    - agents-md-lite
    - claude-md-lite
    - skills-generic
    - skills-ml
    - kickoffs
  fractal-swarm:
    - agents-md-fractal
    - claude-md-lite
    - skills-generic
    - skills-ml
    - kickoffs
    - model-policy
    - harness-min
